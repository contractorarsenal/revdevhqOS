<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<title>revdevhqOS — Agency Operating System</title>
<style>
/* ================= revdevhqOS design tokens ================= */
:root{
  --bg:#F7F8FC; --sb:#F1F4FA; --surface:#FFFFFF; --surface2:#FAFBFE;
  --ink:#111827; --ink2:#64748B; --ink3:#94A3B8;
  --border:#E2E8F0; --border-soft:#EDF1F6;
  --accent:#4F46E5; --accent-ink:#4338CA; --accent-soft:#EEF0FC; --accent-softer:#F5F6FE;
  --c1:#4F46E5; --c2:#0D9488;
  --green:#16A34A; --green-ink:#15803D; --green-bg:#EAF7EF;
  --amber:#D97706; --amber-ink:#B45309; --amber-bg:#FDF3E0;
  --red:#DC2626; --red-ink:#B91C1C; --red-bg:#FDECEC;
  --neut-ink:#64748B; --neut-bg:#F1F5F9;
  --kcol:#F3F5FB; --row-hover:#F8FAFE; --thead:#FAFBFE;
  --shadow-sm:0 1px 2px rgba(15,23,42,.05);
  --shadow-md:0 8px 24px rgba(15,23,42,.10);
  --scrim:rgba(15,23,42,.30);
  --skel1:#EEF1F7; --skel2:#F7F9FC;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0E1116; --sb:#11151D; --surface:#161B23; --surface2:#1A202B;
    --ink:#E7EBF3; --ink2:#94A0B4; --ink3:#64748B;
    --border:#273041; --border-soft:#1F2632;
    --accent:#6E76F2; --accent-ink:#9BA2F7; --accent-soft:#232A46; --accent-softer:#1B2033;
    --c1:#6E76F2; --c2:#0FA896;
    --green:#34C46C; --green-ink:#5DD48A; --green-bg:#14301F;
    --amber:#E8A13C; --amber-ink:#EDB35F; --amber-bg:#33270F;
    --red:#F26D6D; --red-ink:#F58C8C; --red-bg:#3A1717;
    --neut-ink:#94A0B4; --neut-bg:#212836;
    --kcol:#131824; --row-hover:#1B212C; --thead:#181E28;
    --shadow-sm:0 1px 2px rgba(0,0,0,.3);
    --shadow-md:0 12px 32px rgba(0,0,0,.5);
    --scrim:rgba(2,6,14,.55);
    --skel1:#1D2430; --skel2:#242C3A;
  }
}
:root[data-theme="light"]{
  --bg:#F7F8FC; --sb:#F1F4FA; --surface:#FFFFFF; --surface2:#FAFBFE;
  --ink:#111827; --ink2:#64748B; --ink3:#94A3B8;
  --border:#E2E8F0; --border-soft:#EDF1F6;
  --accent:#4F46E5; --accent-ink:#4338CA; --accent-soft:#EEF0FC; --accent-softer:#F5F6FE;
  --c1:#4F46E5; --c2:#0D9488;
  --green:#16A34A; --green-ink:#15803D; --green-bg:#EAF7EF;
  --amber:#D97706; --amber-ink:#B45309; --amber-bg:#FDF3E0;
  --red:#DC2626; --red-ink:#B91C1C; --red-bg:#FDECEC;
  --neut-ink:#64748B; --neut-bg:#F1F5F9;
  --kcol:#F3F5FB; --row-hover:#F8FAFE; --thead:#FAFBFE;
  --shadow-sm:0 1px 2px rgba(15,23,42,.05);
  --shadow-md:0 8px 24px rgba(15,23,42,.10);
  --scrim:rgba(15,23,42,.30);
  --skel1:#EEF1F7; --skel2:#F7F9FC;
}
:root[data-theme="dark"]{
  --bg:#0E1116; --sb:#11151D; --surface:#161B23; --surface2:#1A202B;
  --ink:#E7EBF3; --ink2:#94A0B4; --ink3:#64748B;
  --border:#273041; --border-soft:#1F2632;
  --accent:#6E76F2; --accent-ink:#9BA2F7; --accent-soft:#232A46; --accent-softer:#1B2033;
  --c1:#6E76F2; --c2:#0FA896;
  --green:#34C46C; --green-ink:#5DD48A; --green-bg:#14301F;
  --amber:#E8A13C; --amber-ink:#EDB35F; --amber-bg:#33270F;
  --red:#F26D6D; --red-ink:#F58C8C; --red-bg:#3A1717;
  --neut-ink:#94A0B4; --neut-bg:#212836;
  --kcol:#131824; --row-hover:#1B212C; --thead:#181E28;
  --shadow-sm:0 1px 2px rgba(0,0,0,.3);
  --shadow-md:0 12px 32px rgba(0,0,0,.5);
  --scrim:rgba(2,6,14,.55);
  --skel1:#1D2430; --skel2:#242C3A;
}

/* ================= base ================= */
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:"Inter","SF Pro Text",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:13px; line-height:1.45; color:var(--ink); background:var(--bg);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
button{font:inherit;color:inherit;background:none;border:none;padding:0;cursor:pointer}
input,select{font:inherit;color:inherit}
a{color:inherit;text-decoration:none}
svg{display:block}
:focus-visible{outline:2px solid var(--accent);outline-offset:1px;border-radius:6px}
::placeholder{color:var(--ink3)}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001s!important;transition-duration:.001s!important}
}

/* ================= app shell ================= */
.app{display:flex;min-height:100vh}
.sidebar{
  width:232px;flex:none;background:var(--sb);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:14px 10px 12px;gap:2px;
  position:sticky;top:0;height:100vh;overflow-y:auto;z-index:40;
}
.brand{display:flex;align-items:center;gap:8px;padding:2px 8px 10px}
.brand .mark{width:22px;height:22px;border-radius:6px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;letter-spacing:-.02em}
.brand .name{font-weight:650;font-size:13.5px;letter-spacing:-.01em}
.brand .name span{color:var(--ink2);font-weight:550}
.ws{display:flex;align-items:center;gap:9px;width:100%;text-align:left;padding:7px 8px;border-radius:8px;border:1px solid var(--border);background:var(--surface);box-shadow:var(--shadow-sm);margin-bottom:10px}
.ws:hover{border-color:var(--ink3)}
.ws .wavatar{width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,#4F46E5,#7C71F0);color:#fff;font-size:11px;font-weight:650;display:flex;align-items:center;justify-content:center;flex:none}
.ws .wname{font-weight:600;font-size:12.5px;line-height:1.2}
.ws .wtype{font-size:11px;color:var(--ink2);line-height:1.2}
.ws .chev{margin-left:auto;color:var(--ink3)}
.nav-label{font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);padding:10px 10px 4px}
.nav-item{
  display:flex;align-items:center;gap:9px;width:100%;text-align:left;
  padding:6px 10px;border-radius:7px;color:var(--ink2);font-weight:500;font-size:12.5px;
  position:relative;border:none;
}
.nav-item svg{flex:none;color:var(--ink3)}
.nav-item:hover{background:rgba(148,163,184,.14);color:var(--ink)}
.nav-item.active{background:var(--accent-soft);color:var(--ink);font-weight:600}
.nav-item.active svg{color:var(--accent)}
.nav-item.active::before{content:"";position:absolute;left:-6px;top:7px;bottom:7px;width:3px;border-radius:3px;background:var(--accent)}
.nav-item .count{margin-left:auto;font-size:10.5px;font-weight:600;color:var(--ink2);background:rgba(148,163,184,.18);border-radius:999px;padding:1px 6px;font-variant-numeric:tabular-nums}
.nav-item .dotb{margin-left:auto;width:7px;height:7px;border-radius:50%;background:var(--red)}
.sb-bottom{margin-top:auto;padding-top:10px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:2px}
.user-row{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:8px}
.user-row:hover{background:rgba(148,163,184,.14)}
.user-row .uname{font-weight:600;font-size:12.5px;line-height:1.2}
.user-row .urole{font-size:11px;color:var(--ink2);line-height:1.2}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{
  height:52px;flex:none;display:flex;align-items:center;gap:10px;padding:0 20px;
  background:var(--surface);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:30;
}
.hamburger{display:none;padding:6px;border-radius:6px;color:var(--ink2)}
.hamburger:hover{background:var(--neut-bg)}
.gsearch{
  display:flex;align-items:center;gap:8px;width:340px;max-width:38vw;
  padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);
  color:var(--ink3);font-size:12.5px;cursor:pointer;
}
.gsearch:hover{border-color:var(--ink3)}
.gsearch kbd{margin-left:auto;font-family:inherit;font-size:10.5px;color:var(--ink2);background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:1px 5px}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.demo-pill{font-size:10.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--amber-ink);background:var(--amber-bg);border-radius:999px;padding:3px 9px;white-space:nowrap}
.iconbtn{position:relative;padding:7px;border-radius:7px;color:var(--ink2);border:1px solid transparent}
.iconbtn:hover{background:var(--neut-bg);color:var(--ink)}
.iconbtn .ndot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--red);border:1.5px solid var(--surface)}
.datechip{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:7px;border:1px solid var(--border);font-size:12px;font-weight:550;color:var(--ink2);white-space:nowrap}
.datechip:hover{color:var(--ink);border-color:var(--ink3)}

/* ================= buttons ================= */
.btn{
  display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:7px;
  font-size:12.5px;font-weight:600;border:1px solid transparent;white-space:nowrap;
  transition:background .12s,border-color .12s,color .12s;
}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{filter:brightness(1.08)}
.btn-ghost{background:var(--surface);border-color:var(--border);color:var(--ink);box-shadow:var(--shadow-sm)}
.btn-ghost:hover{border-color:var(--ink3)}
.btn-quiet{color:var(--ink2)}
.btn-quiet:hover{background:var(--neut-bg);color:var(--ink)}
.btn-danger{background:var(--surface);border-color:var(--border);color:var(--red-ink)}
.btn-danger:hover{background:var(--red-bg);border-color:var(--red)}
.btn-sm{padding:4px 9px;font-size:11.5px;border-radius:6px}

/* ================= page scaffolding ================= */
.content{flex:1;padding:20px 24px 48px;min-width:0}
.screen{display:none;max-width:1480px;margin:0 auto}
.screen.active{display:block}
.page-head{display:flex;align-items:flex-start;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.page-head h1{font-size:18px;font-weight:650;letter-spacing:-.015em;margin:0;line-height:1.25;text-wrap:balance}
.page-head .pdesc{color:var(--ink2);font-size:12.5px;margin-top:3px}
.head-actions{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}

.metrics{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:16px}
.metrics.m4{grid-template-columns:repeat(4,1fr)}
.metrics.m5{grid-template-columns:repeat(5,1fr)}
.metrics.m8{grid-template-columns:repeat(4,1fr)}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:12px 14px;box-shadow:var(--shadow-sm);min-width:0}
.m-label{display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink2);white-space:nowrap}
.m-label .info{color:var(--ink3);cursor:help;display:flex}
.m-value{font-size:19px;font-weight:650;letter-spacing:-.02em;margin-top:5px;font-variant-numeric:tabular-nums;white-space:nowrap}
.m-sub{display:flex;align-items:baseline;gap:6px;margin-top:3px;font-size:11.5px;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.delta{display:inline-flex;align-items:center;gap:2px;font-weight:600;font-variant-numeric:tabular-nums}
.delta.up{color:var(--green-ink)}.delta.down{color:var(--red-ink)}.delta.flat{color:var(--ink2)}

.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:12px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 11px;font-size:12.5px;font-weight:550;color:var(--ink2);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;display:flex;align-items:center;gap:6px}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--ink);font-weight:600;border-bottom-color:var(--accent)}
.tab .tcount{font-size:10.5px;font-weight:600;color:var(--ink2);background:var(--neut-bg);border-radius:999px;padding:0 6px;font-variant-numeric:tabular-nums}
.tab.active .tcount{color:var(--accent-ink);background:var(--accent-soft)}

.filterbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.fsearch{display:flex;align-items:center;gap:7px;padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:var(--surface);width:220px;color:var(--ink2)}
.fsearch input{border:none;outline:none;background:transparent;width:100%;font-size:12.5px;color:var(--ink)}
.chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:7px;border:1px dashed var(--border);background:var(--surface);font-size:12px;font-weight:550;color:var(--ink2);white-space:nowrap}
.chip:hover{border-color:var(--ink3);color:var(--ink)}
.chip.solid{border-style:solid}
.chip .cval{color:var(--ink);font-weight:600}
.fspacer{flex:1}

/* ================= cards / tables ================= */
.card{background:var(--surface);border:1px solid var(--border);border-radius:9px;box-shadow:var(--shadow-sm);min-width:0}
.card-h{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--border-soft)}
.card-h h3{font-size:12.5px;font-weight:600;margin:0;letter-spacing:-.005em}
.card-h .sub{font-size:11px;color:var(--ink2)}
.card-h .spread{margin-left:auto;display:flex;align-items:center;gap:6px}
.card-b{padding:12px 14px}
.card-b.flush{padding:0}
.linklike{font-size:11.5px;font-weight:600;color:var(--accent-ink);white-space:nowrap}
.linklike:hover{text-decoration:underline}

.tablewrap{background:var(--surface);border:1px solid var(--border);border-radius:9px;box-shadow:var(--shadow-sm);overflow:hidden}
.tscroll{overflow-x:auto}
table.dt{width:100%;border-collapse:collapse;font-size:12.5px}
.dt th{
  text-align:left;font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  color:var(--ink2);padding:8px 12px;border-bottom:1px solid var(--border);background:var(--thead);
  white-space:nowrap;user-select:none;
}
.dt th.sortable{cursor:pointer}
.dt th.sortable:hover{color:var(--ink)}
.dt th .sic{display:inline-block;vertical-align:-1px;margin-left:3px;color:var(--ink3)}
.dt td{padding:8px 12px;border-bottom:1px solid var(--border-soft);white-space:nowrap;vertical-align:middle}
.dt tbody tr:last-child td{border-bottom:none}
.dt tbody tr{cursor:pointer}
.dt tbody tr:hover td{background:var(--row-hover)}
.dt .num,.dt th.num{text-align:right}
.money{font-variant-numeric:tabular-nums;font-weight:600;letter-spacing:-.01em}
.money.pos{color:var(--green-ink)}
.money.neg{color:var(--red-ink)}
.muted{color:var(--ink2)}
.tiny{font-size:11px;color:var(--ink2)}
.cellmain{font-weight:600}
.cellsub{font-size:11px;color:var(--ink2)}
.dt .cb{width:14px;height:14px;accent-color:var(--accent);cursor:pointer}
.tfoot{display:flex;align-items:center;gap:10px;padding:9px 14px;border-top:1px solid var(--border-soft);font-size:11.5px;color:var(--ink2)}
.tfoot .pager{margin-left:auto;display:flex;gap:4px}
.pgbtn{padding:3px 8px;border:1px solid var(--border);border-radius:6px;font-size:11.5px;font-weight:600;color:var(--ink2)}
.pgbtn.on{background:var(--accent-soft);color:var(--accent-ink);border-color:transparent}
.pgbtn:hover{color:var(--ink)}

/* ================= badges / avatars / health ================= */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;white-space:nowrap;letter-spacing:.01em}
.badge .bdot{width:6px;height:6px;border-radius:50%;background:currentColor;flex:none}
.t-green{background:var(--green-bg);color:var(--green-ink)}
.t-amber{background:var(--amber-bg);color:var(--amber-ink)}
.t-red{background:var(--red-bg);color:var(--red-ink)}
.t-indigo{background:var(--accent-soft);color:var(--accent-ink)}
.t-neutral{background:var(--neut-bg);color:var(--neut-ink)}
.avatar{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:650;color:#fff;flex:none;letter-spacing:.01em}
.avatar.co{border-radius:6px}
.avatar.lg{width:40px;height:40px;font-size:14px;border-radius:9px}
.avatar.xl{width:48px;height:48px;font-size:16px;border-radius:10px}
.avgroup{display:flex;align-items:center;gap:7px;min-width:0}
.health{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:550;white-space:nowrap}
.hbars{display:inline-flex;gap:2px;align-items:flex-end}
.hbars i{width:3.5px;border-radius:2px;background:var(--border);display:block}
.hbars i:nth-child(1){height:5px}.hbars i:nth-child(2){height:8px}.hbars i:nth-child(3){height:11px}
.health.h3 .hbars i{background:var(--green)}
.health.h2 .hbars i:nth-child(-n+2){background:var(--amber)}
.health.h1 .hbars i:nth-child(1){background:var(--red)}
.health.h3{color:var(--green-ink)}.health.h2{color:var(--amber-ink)}.health.h1{color:var(--red-ink)}

/* ================= grid / modules ================= */
.grid12{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}
.col8{grid-column:span 8;min-width:0}.col7{grid-column:span 7;min-width:0}
.col6{grid-column:span 6;min-width:0}.col5{grid-column:span 5;min-width:0}
.col4{grid-column:span 4;min-width:0}.col12{grid-column:span 12;min-width:0}
.stack{display:flex;flex-direction:column;gap:14px;min-width:0}
.list-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-top:1px solid var(--border-soft);cursor:pointer}
.list-row:first-child{border-top:none}
.list-row:hover{background:var(--row-hover)}
.list-row .grow{flex:1;min-width:0}
.list-row .rmain{font-weight:600;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.list-row .rsub{font-size:11px;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.qstripe{width:3px;align-self:stretch;border-radius:3px;flex:none}
.qs-red{background:var(--red)}.qs-amber{background:var(--amber)}.qs-indigo{background:var(--accent)}.qs-green{background:var(--green)}

/* ================= charts ================= */
.chartbox{position:relative}
.chart-legend{display:flex;gap:14px;align-items:center;font-size:11.5px;color:var(--ink2);flex-wrap:wrap}
.lg-item{display:inline-flex;align-items:center;gap:6px;font-weight:550}
.lg-swatch{width:9px;height:9px;border-radius:3px;flex:none}
.seg{display:inline-flex;background:var(--neut-bg);border-radius:7px;padding:2px;gap:2px}
.seg button{padding:4px 10px;border-radius:5px;font-size:11.5px;font-weight:600;color:var(--ink2)}
.seg button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow-sm)}
.gbars{display:flex;align-items:flex-end;gap:14px;height:150px;padding-top:6px}
.gb-group{flex:1;display:flex;align-items:flex-end;gap:2px;height:100%;position:relative}
.gb{flex:1;border-radius:4px 4px 0 0;min-height:3px;cursor:pointer}
.gb:hover{filter:brightness(1.12)}
.gb-lbl{position:absolute;top:100%;left:0;right:0;text-align:center;font-size:10.5px;color:var(--ink2);padding-top:5px;font-variant-numeric:tabular-nums}
.hbar-row{display:flex;align-items:center;gap:10px;padding:5px 0}
.hbar-name{width:130px;flex:none;font-size:12px;font-weight:550;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hbar-track{flex:1;height:14px;border-radius:4px;background:var(--neut-bg);overflow:hidden;min-width:40px}
.hbar-fill{height:100%;border-radius:4px;background:var(--c1)}
.hbar-val{width:64px;flex:none;text-align:right;font-size:12px}
.tipbox{position:fixed;z-index:200;pointer-events:none;background:var(--surface);border:1px solid var(--border);border-radius:7px;box-shadow:var(--shadow-md);padding:7px 10px;font-size:11.5px;display:none;max-width:240px}
.tipbox .tt{font-weight:600;margin-bottom:2px}

.tl-ic.red{background:var(--red-bg);color:var(--red-ink)}

.progress.late i{background:var(--red)}

.menu{position:absolute;top:calc(100% + 6px);right:0;min-width:224px;background:var(--surface);border:1px solid var(--border);border-radius:9px;box-shadow:var(--shadow-md);padding:5px;z-index:80;display:none}

.cmdk-list{max-height:320px;overflow-y:auto;padding:6px}
.cmdk-list .mi{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:8px 10px;border-radius:7px;font-size:13px;font-weight:550}

  .kv{grid-template-columns:110px 1fr}
}

function ic(n,s=15){return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'+(ICONS[n]||'')+'</svg>';}

/* ============ utils ============ */
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const money=n=>'$'+Math.round(n).toLocaleString('en-US');
const moneyK=v=>'$'+(v>=100? Math.round(v) : v.toFixed(1))+'k';
const AVC=['#4F46E5','#0D9488','#B45309','#BE185D','#0369A1','#7C3AED','#15803D','#B91C1C','#475569'];
function avColor(name){let h=0;for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))>>>0;return AVC[h%AVC.length];}
function initials(name){return name.split(/[\s&]+/).filter(w=>/^[A-Za-z]/.test(w)).slice(0,2).map(w=>w[0].toUpperCase()).join('');}
function avatar(name,cls){return '<span class="avatar '+(cls||'')+'" style="background:'+avColor(name)+'">'+initials(name)+'</span>';}
function badge(text,tone,dot=true){return '<span class="badge t-'+tone+'">'+(dot?'<span class="bdot"></span>':'')+text+'</span>';}
const STATUS_TONE={'Active':'green','Paid':'green','Healthy':'green','Completed':'green','Closed Won':'green','Done':'green','Connected':'green','Onboarding':'amber','Pending':'amber','Watch':'amber','Needs attention':'amber','Renewal soon':'amber','Past Due':'red','Past due':'red','Failed':'red','Overdue':'red','At risk':'red','Urgent':'red','Closed Lost':'red','In progress':'indigo','Open':'indigo','Selected':'indigo','New':'indigo','Outstanding':'indigo','Draft':'neutral','Paused':'neutral','Canceled':'neutral','Inactive':'neutral','Not started':'neutral'};
function sbadge(text){return badge(text,STATUS_TONE[text]||'neutral');}
function health(level){const l=level===3?'h3':level===2?'h2':'h1';const t=level===3?'Healthy':level===2?'Watch':'At risk';
 return '<span class="health '+l+'"><span class="hbars"><i></i><i></i><i></i></span>'+t+'</span>';}
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);}
function infoTip(txt){return '<span class="info" title="'+txt.replace(/"/g,'&quot;')+'">'+ic('info',12)+'</span>';}
function metric(m){return '<div class="metric"><div class="m-label">'+m.l+infoTip(m.tip||m.l+' — demo data')+'</div>'+
 '<div class="m-value">'+m.v+'</div>'+
 '<div class="m-sub">'+(m.d?'<span class="delta '+(m.dir||'up')+'">'+(m.dir==='down'?ic('downRight',11):m.dir==='flat'?'':ic('upRight',11))+m.d+'</span>':'')+(m.ctx?'<span>'+m.ctx+'</span>':'')+'</div></div>';}
function metricsRow(list,cls){return '<div class="metrics '+(cls||'')+'">'+list.map(metric).join('')+'</div>';}
function pageHead(t,d,actions){return '<div class="page-head"><div><h1>'+t+'</h1><div class="pdesc">'+d+'</div></div><div class="head-actions">'+(actions||'')+'</div></div>';}
function chipBtn(label,val,extra){return '<button class="chip'+(extra?' '+extra:'')+'" data-toast="Filter: '+label+' — demo only">'+label+(val?' <span class="cval">'+val+'</span>':'')+' '+ic('chevD',12)+'</button>';}
function fsearch(ph){return '<label class="fsearch">'+ic('search',13)+'<input placeholder="'+ph+'" data-demo-search></label>';}
function emptyState(icn,t,d,btn){return '<div class="empty"><div class="eic">'+ic(icn,17)+'</div><div class="et">'+t+'</div><div class="ed">'+d+'</div>'+(btn?'<button class="btn btn-ghost btn-sm" data-toast="Demo action">'+btn+'</button>':'')+'</div>';}

/* ============ tooltip ============ */
const tipEl=document.getElementById('tip');
function showTip(html,x,y){tipEl.innerHTML=html;tipEl.style.display='block';
 const r=tipEl.getBoundingClientRect();
 let lx=x+14, ly=y-r.height-10;
 if(lx+r.width>innerWidth-8)lx=x-r.width-14;
 if(ly<8)ly=y+16;
 tipEl.style.left=lx+'px';tipEl.style.top=ly+'px';}
function hideTip(){tipEl.style.display='none';}

/* ============ line chart ============ */
function lineChart(el,opts){
 const W=Math.max(el.clientWidth,320), H=opts.h||200, pl=44, pr=14, pt=14, pb=24;
 const data=opts.series.map(s=>s.data);
 let lo=Math.min(...data.flat()), hi=Math.max(...data.flat());
 const span=(hi-lo)||1; lo-=span*.12; hi+=span*.08;
 const iw=W-pl-pr, ih=H-pt-pb, n=opts.labels.length;
 const X=i=>pl+iw*(n===1?0:i/(n-1)), Y=v=>pt+ih*(1-(v-lo)/(hi-lo));
 let g='';
 for(let k=0;k<4;k++){const gy=pt+ih*k/3, gv=hi-(hi-lo)*k/3;
  g+='<line x1="'+pl+'" y1="'+gy+'" x2="'+(W-pr)+'" y2="'+gy+'" stroke="var(--border-soft)" stroke-width="1"/>';
  g+='<text x="'+(pl-8)+'" y="'+(gy+3.5)+'" text-anchor="end" font-size="10" fill="var(--ink3)">'+opts.fmt(gv)+'</text>';}
 const step=Math.ceil(n/12);
 for(let i=0;i<n;i+=step){g+='<text x="'+X(i)+'" y="'+(H-7)+'" text-anchor="middle" font-size="10" fill="var(--ink3)">'+opts.labels[i]+'</text>';}
 let marks='';
 opts.series.forEach((s,si)=>{
  const pts=s.data.map((v,i)=>X(i).toFixed(1)+','+Y(v).toFixed(1)).join(' ');
  if(si===0&&opts.area!==false){
   marks+='<polygon points="'+pl+','+(pt+ih)+' '+pts+' '+(W-pr)+','+(pt+ih)+'" fill="'+s.color+'" opacity="0.08"/>';}
  marks+='<polyline points="'+pts+'" fill="none" stroke="'+s.color+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>';
  const lx=X(n-1),ly=Y(s.data[n-1]);
  marks+='<circle cx="'+lx+'" cy="'+ly+'" r="3.5" fill="'+s.color+'" stroke="var(--surface)" stroke-width="2"/>';
 });
 const hoverId='hv'+Math.random().toString(36).slice(2,7);
 el.innerHTML='<svg width="'+W+'" height="'+H+'" role="img" aria-label="'+(opts.aria||'Trend chart')+'">'+g+marks+
  '<line id="'+hoverId+'l" y1="'+pt+'" y2="'+(pt+ih)+'" stroke="var(--ink3)" stroke-width="1" stroke-dasharray="3 3" opacity="0"/>'+
  opts.series.map((s,si)=>'<circle id="'+hoverId+'c'+si+'" r="3.5" fill="'+s.color+'" stroke="var(--surface)" stroke-width="2" opacity="0"/>').join('')+
  '<rect x="'+pl+'" y="'+pt+'" width="'+iw+'" height="'+ih+'" fill="transparent"/></svg>';
 const svg=el.querySelector('svg');
 svg.addEventListener('mousemove',e=>{
  const r=svg.getBoundingClientRect();
  const fx=Math.min(Math.max(e.clientX-r.left,pl),W-pr);
  const i=Math.round((fx-pl)/iw*(n-1));
  const x=X(i);
  const vl=svg.querySelector('#'+hoverId+'l'); vl.setAttribute('x1',x); vl.setAttribute('x2',x); vl.setAttribute('opacity','1');
  let rows='';
  opts.series.forEach((s,si)=>{const c=svg.querySelector('#'+hoverId+'c'+si);
   c.setAttribute('cx',x); c.setAttribute('cy',Y(s.data[i])); c.setAttribute('opacity','1');
   rows+='<div class="tr"><span class="lg-swatch" style="background:'+s.color+'"></span>'+s.name+'<b>'+opts.fmt(s.data[i])+'</b></div>';});
  showTip('<div class="tt">'+opts.labels[i]+(opts.tipSuffix||'')+'</div>'+rows,e.clientX,e.clientY);
 });
 svg.addEventListener('mouseleave',()=>{hideTip();
  svg.querySelector('#'+hoverId+'l').setAttribute('opacity','0');
  opts.series.forEach((s,si)=>svg.querySelector('#'+hoverId+'c'+si).setAttribute('opacity','0'));});
}

function bindKanban(){
 let dragId=null;
 $$('#kb .kcard').forEach(cd=>{
  cd.addEventListener('dragstart',e=>{dragId=+cd.dataset.oid;cd.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
  cd.addEventListener('dragend',()=>{dragId=null;cd.classList.remove('dragging');$$('#kb .kcol').forEach(c=>c.classList.remove('dragover'));});
 });
 $$('#kb .kcol').forEach(col=>{
  col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('dragover');});
  col.addEventListener('dragleave',()=>col.classList.remove('dragover'));
  col.addEventListener('drop',e=>{e.preventDefault();
   if(dragId==null)return;
   const o=OPPS.find(x=>x.id===dragId), si=+col.dataset.stage;
   if(o&&o.stage!==si){o.stage=si;o.days=0;renderPipeline();toast('Moved '+o.company+' to “'+STAGES[si].n+'” — demo only');}
  });
 });
}

function go(name){
 S.screen=name;
 $$('.screen').forEach(sc=>sc.classList.toggle('active',sc.id==='s-'+name));
 const navKey=name==='client-detail'?'clients':name;
 $$('.nav-item[data-screen]').forEach(n=>n.classList.toggle('active',n.dataset.screen===navKey));
 closeDrawer();closeMenus();
 (RENDER[name]||(()=>{}))();
 $('#sidebar').classList.remove('open');$('#scrim').classList.remove('show');
 window.scrollTo({top:0});
}
function openDrawer(html){
 const d=$('#drawer');d.innerHTML=html;d.classList.add('open');
 $('#scrim').classList.add('show');
}
function closeDrawer(){$('#drawer').classList.remove('open');if(!$('#sidebar').classList.contains('open')&&!$('#cmdk').classList.contains('open'))$('#scrim').classList.remove('show');}
function closeMenus(){$('#quickMenu').classList.remove('open');}
function openCmdk(){$('#cmdk').classList.add('open');$('#cmdkInput').value='';buildCmdk('');$('#cmdkInput').focus();}
function closeCmdk(){$('#cmdk').classList.remove('open');}
const CMD_ITEMS=[
 ...NAVP.concat(NAVS).map(n=>({t:'Go to '+n[1],icn:n[2],hint:'Screen',fn:()=>go(n[0])})),
 ...CLIENTS.slice(0,8).map(c=>({t:c.name,icn:'users',hint:'Client',fn:()=>{S.detId=c.id;S.detTab='Overview';go('client-detail');}})),
 {t:'Create invoice',icn:'doc',hint:'Action',fn:()=>toast('Create invoice — demo only')},

];
function buildCmdk(q){
 const list=CMD_ITEMS.filter(x=>x.t.toLowerCase().includes(q.toLowerCase())).slice(0,9);
 $('#cmdkList').innerHTML=list.map((x,idx)=>'<button class="mi'+(idx===0?' sel':'')+'" data-cmd="'+CMD_ITEMS.indexOf(x)+'">'+ic(x.icn,14)+x.t+'<span class="hint">'+x.hint+'</span></button>').join('')||'<div class="empty" style="padding:20px"><div class="ed">No matches for “'+q+'”</div></div>';

$('#quickMenu').innerHTML='<div class="mlabel">Quick add · demo</div>'
 +[['user','Add lead'],['users','Add client'],['target','Add opportunity'],['repeat','Add subscription'],['doc','Create invoice'],['dollar','Record payment'],['checksq','Add task'],['note','Add note']]
 .map(q=>'<button class="mi" data-toast="'+q[1]+' form — demo only">'+ic(q[0],14)+q[1]+'</button>').join('');
$('#navPrimary').innerHTML=navHTML(NAVP);
$('#navSecondary').innerHTML=navHTML(NAVS);
$$('[data-ic]').forEach(sp=>{sp.innerHTML=ic(sp.dataset.ic,sp.dataset.ic==='menu'?17:14);});

/* ============ delegation ============ */
document.addEventListener('click',e=>{
 const cmdBtn=e.target.closest('[data-cmd]');
 if(cmdBtn){const it=CMD_ITEMS[+cmdBtn.dataset.cmd];closeCmdk();$('#scrim').classList.remove('show');it.fn();return;}
 if(e.target.closest('#searchOpen')){openCmdk();return;}
 if(e.target.closest('#quickAddBtn')){$('#quickMenu').classList.toggle('open');return;}
 if(e.target.closest('#hamburger')){$('#sidebar').classList.add('open');$('#scrim').classList.add('show');return;}
 if(e.target.id==='scrim'){closeDrawer();$('#sidebar').classList.remove('open');$('#scrim').classList.remove('show');return;}
 if(e.target.id==='cmdk'){closeCmdk();return;}
 if(!e.target.closest('.qwrap'))closeMenus();
 const el=e.target.closest('[data-act],[data-toast],[data-screen],[data-stop]');
 if(!el)return;
 if(el.dataset.screen){go(el.dataset.screen);return;}
 const act=el.dataset.act, v=el.dataset.v, i=+el.dataset.i;
 if(!act){if(el.dataset.toast)toast(el.dataset.toast);return;}
 switch(act){
  case 'nav-go':go(v);break;
  case 'quick-add':$('#quickMenu').classList.add('open');window.scrollTo({top:0,behavior:'smooth'});break;
  case 'dash-mode':S.dashMode=v;$$('#s-dashboard .seg button').forEach(bn=>bn.classList.toggle('on',bn.dataset.v===v));drawDashChart();break;
  case 'cl-tab':S.clTab=v;renderClients();break;
  case 'cl-sort':{const k=el.dataset.k;S.clSort=[k,S.clSort[0]===k?-S.clSort[1]:(k==='mrr'?-1:1)];renderClients();break;}
  case 'cl-all':{const on=el.checked;$$('#s-clients tbody .cb').forEach(cb=>cb.checked=on);toast(on?'12 clients selected — bulk actions in toolbar (demo)':'Selection cleared');break;}
  case 'client-drawer':clientDrawer(i);break;
  case 'client-open':S.detId=i;S.detTab='Overview';go('client-detail');break;
  case 'det-tab':S.detTab=v;$$('#s-client-detail .tab').forEach(tb=>tb.classList.toggle('active',tb.dataset.v===v));renderDetTab(CLIENTS.find(x=>x.id===S.detId));break;
  case 'lead-drawer':leadDrawer(i);break;
  case 'opp-drawer':oppDrawer(i);break;
  case 'task-drawer':taskDrawer(i);break;
  case 'onb-drawer':onbDrawer(i);break;
  case 'bill-tab':S.billTab=v;$$('#s-billing .tab').forEach(tb=>tb.classList.toggle('active',tb.dataset.v===v));renderBillTab();break;
  case 'task-scope':S.taskScope=v;renderTasks();break;
  case 'task-view':S.taskView=v;renderTasks();break;
  case 'onb-view':S.onbView=v;renderOnboarding();break;
  case 'rep-cat':S.repCat=v;renderReports();break;
  case 'set-sec':S.setSec=v;renderSettings();break;
  case 'drawer-close':closeDrawer();break;
 }
 if(el.dataset.toast&&act!=='cl-all')toast(el.dataset.toast);
 if(el.closest('#quickMenu'))closeMenus();
});
document.addEventListener('input',e=>{
 if(e.target.id==='cmdkInput'){buildCmdk(e.target.value);return;}
 const live=e.target.dataset.live;
 if(!live)return;
 const val=e.target.value;
 if(live==='cl-q'){S.clQ=val;renderClients();const inp=$('#s-clients [data-live="cl-q"]');inp.focus();inp.setSelectionRange(val.length,val.length);}
 if(live==='lead-q'){S.leadQ=val;renderLeads();const inp=$('#s-leads [data-live="lead-q"]');inp.focus();inp.setSelectionRange(val.length,val.length);}
});
document.addEventListener('keydown',e=>{
 if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();$('#cmdk').classList.contains('open')?closeCmdk():openCmdk();return;}
 if(e.key==='Escape'){closeCmdk();closeDrawer();closeMenus();$('#sidebar').classList.remove('open');$('#scrim').classList.remove('show');}
 if(e.key==='Enter'&&e.target.id==='cmdkInput'){const first=$('#cmdkList [data-cmd]');if(first)first.click();}
 if(e.key==='Enter'&&e.target.dataset&&e.target.dataset.toastOnEnter){toast(e.target.dataset.toastOnEnter);e.target.blur();}
});
let rsz;
window.addEventListener('resize',()=>{clearTimeout(rsz);rsz=setTimeout(()=>{(RENDER[S.screen]||(()=>{}))();},220);});

/* ============ boot ============ */
go('dashboard');
</script>

</body>
</html>
